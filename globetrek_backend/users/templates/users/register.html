<!DOCTYPE html>
<html>
<head>
    <title>Register - GlobeTrek</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Register</h2>
    <form method="post">
        {% csrf_token %}
        <h3>Account Info</h3>
        {{ user_form.as_p }}
        <h3>Profile Info</h3>
        {{ profile_form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="/users/login/">Login</a></p>
</body>
</html>
