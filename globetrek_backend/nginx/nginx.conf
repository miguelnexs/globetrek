upstream backend_django {
    server web:8000;
}

server {
    listen 80;
    server_name globetrek.cloud www.globetrek.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name globetrek.cloud www.globetrek.cloud;

    ssl_certificate /etc/letsencrypt/live/globetrek.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globetrek.cloud/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        root /app/frontend_dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /users/ {
        proxy_pass http://backend_django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        client_max_body_size 100M;
    }

    location /admin/ {
        proxy_pass http://backend_django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        client_max_body_size 100M;
    }
}
